<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="#{index.page.title}">CopyPaste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body { background: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
        .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
        textarea { resize: vertical; }
        .clips-list { max-height: calc(100vh - 180px); overflow-y: auto; }
        .clip-item { border-left: 3px solid transparent; transition: border-color .15s; }
        .clip-item:hover { border-left-color: #0d6efd; }
        .clip-item.file { border-left-color: #0dcaf0; }
        .clip-preview { font-size: .8rem; color: #6c757d; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid px-4">
        <a class="navbar-brand" href="/"><i class="bi bi-clipboard2-fill me-2"></i>CopyPaste</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-light small" th:text="${userEmail}"></span>
            <div class="d-flex gap-1">
                <a href="?lang=en" class="btn btn-outline-light btn-sm">EN</a>
                <a href="?lang=pt" class="btn btn-outline-light btn-sm">PT</a>
            </div>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm" th:text="#{nav.logout}">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container-fluid px-4 py-4">
    <div class="row g-4">

        <!-- Left: my clips -->
        <div class="col-lg-3 col-md-4">
            <div class="card h-100">
                <div class="card-header bg-white fw-semibold">
                    <i class="bi bi-collection me-2"></i><span th:text="#{index.my.clips}">My clips</span>
                    <span class="badge bg-secondary ms-1" th:text="${myClips.size()}"></span>
                </div>
                <div class="clips-list">
                    <div th:if="${myClips.isEmpty()}" class="text-center text-muted py-4 small">
                        <i class="bi bi-inbox d-block mb-2" style="font-size:1.5rem"></i>
                        <span th:text="#{index.no.clips}">No active clips yet</span>
                    </div>
                    <div th:each="clip : ${myClips}"
                         th:classappend="${clip.type.name() == 'FILE'} ? 'file' : ''"
                         class="list-group-item clip-item px-3 py-2">
                        <div class="d-flex align-items-start gap-2">
                            <a th:href="@{/c/{token}(token=${clip.token})}" class="flex-grow-1 text-decoration-none text-body">
                                <div class="d-flex align-items-center justify-content-between mb-1">
                                    <span th:if="${clip.type.name() == 'TEXT'}" class="badge bg-secondary" style="font-size:.7rem">
                                        <i class="bi bi-type me-1"></i><span th:text="#{clip.badge.text}">Text</span>
                                    </span>
                                    <span th:if="${clip.type.name() == 'FILE'}" class="badge bg-info text-dark" style="font-size:.7rem">
                                        <i class="bi bi-file-earmark me-1"></i><span th:text="#{clip.badge.file}">File</span>
                                    </span>
                                    <small class="text-muted" style="font-size:.7rem">
                                        <i class="bi bi-clock me-1"></i>
                                        <span th:text="${#temporals.format(clip.expiresAt, 'dd/MM HH:mm', #locale)}"></span>
                                    </small>
                                </div>
                                <div class="clip-preview" th:if="${clip.type.name() == 'TEXT'}" th:text="${clip.textContent}"></div>
                                <div class="clip-preview" th:if="${clip.type.name() == 'FILE'}">
                                    <i class="bi bi-file-earmark me-1"></i><span th:text="${clip.originalFileName}"></span>
                                </div>
                            </a>
                            <form th:action="@{/c/{token}/delete(token=${clip.token})}" method="post" class="m-0">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-link text-danger p-0"
                                        th:attr="onclick='return confirm(\'' + #{clip.delete.confirm} + '\')'"
                                        title="Delete">
                                    <i class="bi bi-trash" style="font-size:.85rem"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: create new clip -->
        <div class="col-lg-9 col-md-8">

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <h5 class="card-title mb-4" th:text="#{index.share.title}">Share something</h5>

                    <ul class="nav nav-pills mb-4" id="clipTabs">
                        <li class="nav-item">
                            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#textPanel">
                                <i class="bi bi-type me-1"></i><span th:text="#{index.tab.text}">Text</span>
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#filePanel">
                                <i class="bi bi-file-earmark-arrow-up me-1"></i><span th:text="#{index.tab.file}">File</span>
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content">

                        <!-- Text tab -->
                        <div class="tab-pane fade show active" id="textPanel">
                            <form th:action="@{/clip/text}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <div class="mb-3">
                                    <textarea name="text" class="form-control font-monospace" rows="10"
                                              th:placeholder="#{index.text.placeholder}" required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">
                                        <i class="bi bi-shield-lock me-1"></i><span th:text="#{index.restrict.label}">Restrict access to emails</span>
                                        <span class="text-muted" th:text="'(' + #{index.restrict.hint} + ')'"></span>
                                    </label>
                                    <input type="text" name="allowedEmails" class="form-control"
                                           th:placeholder="#{index.emails.placeholder}"/>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-link-45deg me-1"></i><span th:text="#{index.generate.link}">Generate link</span>
                                </button>
                            </form>
                        </div>

                        <!-- File tab -->
                        <div class="tab-pane fade" id="filePanel">
                            <form th:action="@{/clip/file}" method="post" enctype="multipart/form-data">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <div class="mb-3">
                                    <label class="form-label">
                                        <span th:text="#{index.file.label}">File</span>
                                        <span class="text-muted small" th:text="'(' + #{index.file.maxsize} + ')'"></span>
                                    </label>
                                    <input type="file" name="file" class="form-control" required/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">
                                        <i class="bi bi-shield-lock me-1"></i><span th:text="#{index.restrict.label}">Restrict access to emails</span>
                                        <span class="text-muted" th:text="'(' + #{index.restrict.hint} + ')'"></span>
                                    </label>
                                    <input type="text" name="allowedEmails" class="form-control"
                                           th:placeholder="#{index.emails.placeholder}"/>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-link-45deg me-1"></i><span th:text="#{index.generate.link}">Generate link</span>
                                </button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>

            <p class="text-muted small mt-3">
                <i class="bi bi-clock me-1"></i><span th:text="#{index.expire.note}">Links expire automatically after 24 hours.</span>
            </p>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
