<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="#{index.page.title}">CopyPaste</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
    <style>
        body { background: #f8f9fa; }
        .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
        .card { border: none; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
        .nav-pills .nav-link.active { background-color: #0d6efd; }
        textarea { resize: vertical; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/"><i class="bi bi-clipboard2-fill me-2"></i>CopyPaste</a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-light small" th:text="${userEmail}"></span>
            <div class="d-flex gap-1">
                <a href="?lang=en" class="btn btn-outline-light btn-sm">EN</a>
                <a href="?lang=pt" class="btn btn-outline-light btn-sm">PT</a>
            </div>
            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm" th:text="#{nav.logout}">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <span th:text="${error}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <h5 class="card-title mb-4" th:text="#{index.share.title}">Share something</h5>

                    <ul class="nav nav-pills mb-4" id="clipTabs">
                        <li class="nav-item">
                            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#textPanel">
                                <i class="bi bi-type me-1"></i><span th:text="#{index.tab.text}">Text</span>
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#filePanel">
                                <i class="bi bi-file-earmark-arrow-up me-1"></i><span th:text="#{index.tab.file}">File</span>
                            </button>
                        </li>
                    </ul>

                    <div class="tab-content">

                        <!-- Text tab -->
                        <div class="tab-pane fade show active" id="textPanel">
                            <form th:action="@{/clip/text}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <div class="mb-3">
                                    <textarea name="text" class="form-control font-monospace" rows="10"
                                              th:placeholder="#{index.text.placeholder}" required></textarea>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">
                                        <i class="bi bi-shield-lock me-1"></i><span th:text="#{index.restrict.label}">Restrict access to emails</span>
                                        <span class="text-muted" th:text="'(' + #{index.restrict.hint} + ')'"></span>
                                    </label>
                                    <input type="text" name="allowedEmails" class="form-control"
                                           th:placeholder="#{index.emails.placeholder}"/>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-link-45deg me-1"></i><span th:text="#{index.generate.link}">Generate link</span>
                                </button>
                            </form>
                        </div>

                        <!-- File tab -->
                        <div class="tab-pane fade" id="filePanel">
                            <form th:action="@{/clip/file}" method="post" enctype="multipart/form-data">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <div class="mb-3">
                                    <label class="form-label">
                                        <span th:text="#{index.file.label}">File</span>
                                        <span class="text-muted small" th:text="'(' + #{index.file.maxsize} + ')'"></span>
                                    </label>
                                    <input type="file" name="file" class="form-control" required/>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label text-muted small">
                                        <i class="bi bi-shield-lock me-1"></i><span th:text="#{index.restrict.label}">Restrict access to emails</span>
                                        <span class="text-muted" th:text="'(' + #{index.restrict.hint} + ')'"></span>
                                    </label>
                                    <input type="text" name="allowedEmails" class="form-control"
                                           th:placeholder="#{index.emails.placeholder}"/>
                                </div>
                                <button type="submit" class="btn btn-primary w-100">
                                    <i class="bi bi-link-45deg me-1"></i><span th:text="#{index.generate.link}">Generate link</span>
                                </button>
                            </form>
                        </div>

                    </div>
                </div>
            </div>

            <p class="text-center text-muted small mt-3">
                <i class="bi bi-clock me-1"></i><span th:text="#{index.expire.note}">Links expire automatically after 24 hours.</span>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
