spring.application.name=copy-paste
server.port=8090

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/copy-paste

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# File storage
app.storage.upload-dir=./uploads

# Clip TTL
app.clip.ttl-hours=24

# Cleanup scheduler cron (every hour)
app.cleanup.cron=0 0 * * * *

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB

# Actuator
management.endpoints.web.exposure.include=health

logging.level.com.rready.copypaste=INFO
