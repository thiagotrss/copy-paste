spring.application.name=copy-paste
server.port=8090
server.forward-headers-strategy=native
server.tomcat.use-relative-redirects=true

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/copy-paste

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# File storage
app.storage.upload-dir=./uploads

# Clip TTL
app.clip.ttl-hours=24

# Cleanup scheduler cron (every hour)
app.cleanup.cron=0 0 * * * *

# Multipart
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB

# Actuator
management.endpoints.web.exposure.include=health

logging.level.com.rready.copypaste=INFO

# Sentry / Bugsink
sentry.dsn=http://e11080f9f2d149bc913b82c41ff8344e@192.168.0.4:8000/3
sentry.traces-sample-rate=1.0
sentry.environment=production
sentry.diagnostic-level=warning
